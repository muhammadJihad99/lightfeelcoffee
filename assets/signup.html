<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | LightFeel Coffee</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            font-family: "Poppins", sans-serif;
            background: #111;
            color: #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .signup-container {
            padding: 40px;
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        h1 {
            font-family: "Playfair Display", serif;
            color: #c59d5f;
            text-align: center;
            margin-bottom: 30px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow: hidden;
        }

        .form-step {
            display: none;
            flex-direction: column;
            gap: 20px;
            opacity: 0;
            transform: translateX(50px);
            transition: all 0.5s ease;
        }

        .form-step.active {
            display: flex;
            opacity: 1;
            transform: translateX(0);
        }

        .form-group {
            position: relative;
            flex: 1 1 45%;
            min-width: 200px;
        }

        .form-group.full-width {
            flex: 1 1 100%;
        }

        .form-group input {
            width: 90%;
            padding: 12px 12px 12px 40px;
            border-radius: 8px;
            border: 1px solid #333;
            outline: none;
            font-size: 14px;
            background: #111;
            color: #fff;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: #c59d5f;
            box-shadow: 0 0 10px rgba(197, 157, 95, 0.4);
        }

        .form-group i {
            position: absolute;
            top: 50%;
            left: 12px;
            transform: translateY(-50%);
            color: #c59d5f;
            pointer-events: none;
        }

        .form-group .toggle-password {
            position: absolute;
            top: 50%;
            right: 8px;
            transform: translateY(-50%);
            cursor: pointer;
            color: #c59d5f;
            z-index: 2;
            transition: 0.3s;
        }

        .form-group .toggle-password:hover {
            color: #fff;
        }

        .button-group {
            width: 99%;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #c59d5f;
            color: #111;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            flex: 1;
        }

        button:hover {
            background: #b88a45;
        }

        .signin-link {
            text-align: left;
            font-size: 12px;
            margin-top: 10px;

        }

        .signin-link a {
            color: #c59d5f;
            text-decoration: none;
        }

        .signin-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 500px) {
            .form-group {
                width: 90%;
                flex: 1 1 100%;
            }

        }

        #closeBtn {
            cursor: pointer;
            color: #fff;
            font-size: 20px;
            position: absolute;
            right: 20px;
            top: 20px;
        }

        /* Animasi shake untuk field yang wajib diisi */
        @keyframes shake {
            0% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-8px);
            }

            40% {
                transform: translateX(8px);
            }

            60% {
                transform: translateX(-8px);
            }

            80% {
                transform: translateX(8px);
            }

            100% {
                transform: translateX(0);
            }
        }

        .shake {
            animation: shake 0.5s;
            border-color: #ff4d4d !important;
            box-shadow: 0 0 10px rgba(255, 77, 77, 0.6);
        }

        /* Popup password lemah - Responsif */
        .password-popup {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #ff4d4d;
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(255, 77, 77, 0.5);
            font-weight: 500;
            z-index: 9999;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s ease;
            max-width: 90%;
            word-wrap: break-word;
            font-size: 0.95rem;
        }

        .password-popup.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Responsif untuk layar kecil */
        @media (max-width: 500px) {
            .password-popup {
                margin-left: 30px;
                top: 80px;
                right: 80px;
                padding: 10px 15px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>

<body>

    <div id="passwordPopup" class="password-popup">Password terlalu lemah! Gunakan huruf besar, kecil, angka & simbol.</div>

    <div class="signup-container">
        <i class="fa-solid fa-xmark close-btn" id="closeBtn" title="Close"></i>

        <h1><i class="fa-solid fa-user-plus"></i> Sign Up</h1>

        <form id="signupForm" action="process_signup.php" method="POST" enctype="multipart/form-data">

            <!-- Step 1: Personal Info -->
            <div class="form-step active" id="step1">
                <div class="form-group full-width">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" name="full_name" placeholder="Nama Lengkap" required>
                </div>
                <div class="form-group full-width">
                    <i class="fa-solid fa-id-badge"></i>
                    <input type="text" name="nickname" placeholder="Nama Julukan" required>
                </div>
                <div class="form-group full-width">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" name="email" placeholder="Email" required>
                </div>
                <div class="form-group full-width">
                    <i class="fa-solid fa-image"></i>
                    <input type="file" name="profile_photo" accept="image/*">
                </div>
                <div class="button-group">
                    <button type="button" id="next1">Selanjutnya</button>
                </div>
            </div>

            <!-- Step 2: Birth & Address -->
            <div class="form-step" id="step2">
                <div class="form-group">
                    <i class="fa-solid fa-location-dot"></i>
                    <input type="text" name="birth_place" placeholder="Tempat Lahir" required>
                </div>
                <div class="form-group">
                    <i class="fa-solid fa-calendar"></i>
                    <input type="date" name="birth_date" placeholder="Tanggal Lahir" required>
                </div>
                <div class="form-group full-width">
                    <i class="fa-solid fa-home"></i>
                    <input type="text" name="address" placeholder="Alamat Saat Ini" required>
                </div>
                <div class="form-group full-width">
                    <i class="fa-solid fa-phone"></i>
                    <input type="tel" name="phone" placeholder="No Telp" required>
                </div>
                <div class="button-group">
                    <button type="button" id="prev2">Sebelumnya</button>
                    <button type="button" id="next2">Selanjutnya</button>
                </div>
            </div>

            <!-- Step 3: Social Media -->
            <div class="form-step" id="step3">
                <div class="form-group">
                    <i class="fa-brands fa-tiktok"></i>
                    <input type="text" name="tiktok" placeholder="Username TikTok" required>
                </div>
                <div class="form-group">
                    <i class="fa-brands fa-instagram"></i>
                    <input type="text" name="instagram" placeholder="Username Instagram" required>
                </div>
                <div class="form-group">
                    <i class="fa-brands fa-facebook"></i>
                    <input type="text" name="facebook" placeholder="Username Facebook" required>
                </div>
                <div class="button-group">
                    <button type="button" id="prev3">Sebelumnya</button>
                    <button type="button" id="next3">Selanjutnya</button>
                </div>
            </div>

            <!-- Step 4: Password -->
            <div class="form-step" id="step4">
                <div class="form-group" style="position: relative; display: flex; align-items: center;">
                    <i class="fa-solid fa-lock" style="position: absolute; left:12px; color:#c59d5f;"></i>
                    <input type="password" name="password" placeholder="Password" id="password" required style="flex:1; padding-left: 40px; padding-right: 40px;">
                </div>
                <div class="form-group" style="position: relative; display: flex; align-items: center;">
                    <i class="fa-solid fa-lock" style="position: absolute; left:12px; color:#c59d5f;"></i>
                    <input type="password" name="confirm_password" placeholder="Konfirmasi Password" id="confirmPassword" required style="flex:1; padding-left: 40px; padding-right: 40px;">
                </div>
                <div class="button-group">
                    <button type="button" id="prev4">Sebelumnya</button>
                    <button type="submit">Daftar</button>
                </div>
            </div>
        </form>

        <div class="signin-link">
            Sudah punya akun? <a href="signin.php">Sign In di sini</a>
        </div>

    </div>

    <script>
        const steps = ['step1', 'step2', 'step3', 'step4'];
        const form = document.getElementById('signupForm');
        const closeBtn = document.getElementById('closeBtn');
        const passwordPopup = document.getElementById('passwordPopup');

        // Fungsi untuk validasi field wajib di step tertentu
        function validateStep(stepId) {
            const stepInputs = document.getElementById(stepId).querySelectorAll('input[required]');
            let valid = true;
            stepInputs.forEach(input => {
                if (!input.value.trim()) {
                    valid = false;
                    input.classList.add('shake');
                    setTimeout(() => input.classList.remove('shake'), 600);
                }
            });
            return valid;
        }

        // --- Navigasi multi-step ---
        steps.forEach((step, index) => {
            const nextBtn = document.getElementById('next' + (index + 1));
            const prevBtn = document.getElementById('prev' + (index + 1));

            if (nextBtn) {
                nextBtn.addEventListener('click', () => {
                    // Validasi semua step sebelumnya sebelum lanjut
                    let canProceed = true;
                    for (let i = 0; i <= index; i++) {
                        if (!validateStep(steps[i])) {
                            canProceed = false;
                            // Pindahkan ke step pertama yang belum valid
                            document.querySelector('.form-step.active').classList.remove('active');
                            document.getElementById(steps[i]).classList.add('active');
                            break;
                        }
                    }

                    if (canProceed) {
                        document.getElementById(steps[index]).classList.remove('active');
                        document.getElementById(steps[index + 1]).classList.add('active');
                    }
                });
            }

            if (prevBtn) {
                prevBtn.addEventListener('click', () => {
                    document.getElementById(steps[index]).classList.remove('active');
                    document.getElementById(steps[index - 1]).classList.add('active');
                });
            }
        });

        // --- LocalStorage untuk input ---
        const inputs = form.querySelectorAll('input:not([type="file"])');
        inputs.forEach(input => {
            const saved = localStorage.getItem(input.name);
            if (saved) input.value = saved;

            input.addEventListener('input', () => {
                localStorage.setItem(input.name, input.value);
            });
        });

        // --- Tombol close ---
        closeBtn.addEventListener('click', () => {
            window.location.href = '../index.html';
        });

        // --- Validasi akhir saat submit ---
        form.addEventListener('submit', function(e) {
            let valid = true;

            // Validasi semua step
            for (let i = 0; i < steps.length; i++) {
                if (!validateStep(steps[i])) {
                    valid = false;
                    // Pindahkan ke step pertama yang belum valid
                    document.querySelector('.form-step.active').classList.remove('active');
                    document.getElementById(steps[i]).classList.add('active');
                    break;
                }
            }

            // Validasi password
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/;

            if (!passwordRegex.test(password)) {
                valid = false;
                passwordPopup.innerText = 'Password terlalu lemah! Gunakan huruf besar, kecil, angka & simbol.';
                passwordPopup.classList.add('show');
                setTimeout(() => passwordPopup.classList.remove('show'), 3000);
                document.querySelector('.form-step.active').classList.remove('active');
                document.getElementById('step4').classList.add('active');
            } else if (password !== confirmPassword) {
                valid = false;
                passwordPopup.innerText = 'Password dan konfirmasi tidak sama!';
                passwordPopup.classList.add('show');
                setTimeout(() => passwordPopup.classList.remove('show'), 3000);
                document.querySelector('.form-step.active').classList.remove('active');
                document.getElementById('step4').classList.add('active');
            }

            if (!valid) e.preventDefault();
        });
    </script>

</body>

</html>
